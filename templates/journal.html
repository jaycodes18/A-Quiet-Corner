<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Quiet Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #dcd4c1;
            color: #2e2820;
            font-family: "Crimson Text", serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            cursor: url('https://img.icons8.com/ios-glyphs/30/5a4236/fountain-pen-tip.png'), auto;
        }

        .diary-container {
            width: 100%;
            max-width: 900px;
            transition: max-width 0.5s ease;
        }
        .diary-container.closed {
            max-width: 450px;
        }

        .diary-cover {
            background-color: #4a2c1b;
            color: #f5efe0;
            padding: 80px 40px;
            text-align: center;
            border-radius: 4px 12px 12px 4px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.3);
            border-left: 15px solid #2b180e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 520px;
            box-sizing: border-box;
        }
        .diary-cover h1 {
            font-size: 42px;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #dfba6b;
        }
        .diary-cover .subtitle {
            font-size: 16px;
            font-style: italic;
            opacity: 0.7;
            margin-bottom: 60px;
        }
        .open-book-btn {
            background: #dfba6b;
            color: #2b180e;
            border: none;
            padding: 12px 30px;
            font-family: "Crimson Text", serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .open-book-btn:hover {
            background: #f0cf85;
            transform: translateY(-2px);
        }

        .open-book {
            display: none;
            background: #5a3a26;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            position: relative;
        }

        .exit-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .exit-btn {
            background: transparent;
            color: #f5efe0;
            border: none;
            font-family: "Crimson Text", serif;
            font-size: 15px;
            font-style: italic;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 4px 8px;
        }
        .exit-btn:hover {
            opacity: 1;
        }

        .pages-wrapper {
            display: flex;
            background: #fffdf9;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .pages-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.15), rgba(0,0,0,0), rgba(0,0,0,0.15));
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .page-side {
            flex: 1;
            width: 50%;
            min-height: 520px;
            padding: 40px 45px;
            box-sizing: border-box;
            position: relative;
            background-image: linear-gradient(#e3dac9 1px, transparent 1px);
            background-size: 100% 32px;
        }
        .left-page {
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .right-page {
            border-left: 1px solid rgba(0,0,0,0.05);
        }

        .left-page::before {
            content: ''; position: absolute; top: 0; left: 35px; height: 100%; width: 1px; background-color: #f0c2c2;
        }
        .right-page::before {
            content: ''; position: absolute; top: 0; right: 35px; height: 100%; width: 1px; background-color: #f0c2c2;
        }

        .diary-date {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: #4a6b82;
            margin-bottom: 24px;
            line-height: 32px;
            height: 32px;
            border-bottom: 1px dashed #e3dac9;
        }
        textarea {
            width: 100%;
            height: 352px;
            background: transparent;
            border: none;
            font-family: "Caveat", cursive;
            font-size: 28px;
            line-height: 32px;
            color: #2e2820;
            resize: none;
            outline: none;
            padding: 0;
            overflow: hidden;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .nav-btn {
            background-color: #5a4236;
            color: #f5efe0;
            border: none;
            padding: 8px 20px;
            font-family: "Crimson Text", serif;
            font-size: 16px;
            font-style: italic;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:hover {
            background-color: #443128;
        }
    </style>
</head>
<body>

    <div class="diary-container closed" id="diaryWrapper">
        
        <div class="diary-cover" id="coverState">
            <h1>A Quiet Corner</h1>
            <div class="subtitle">A digital sanctuary for your thoughts.</div>
            <button class="open-book-btn" onclick="openDiary()">Start Writing</button>
        </div>

        <div class="open-book" id="bookState">
            <div class="exit-wrapper">
                <button type="button" class="exit-btn" onclick="closeDiary()">✕ Close Diary</button>
            </div>

            <form id="diaryForm">
                <input type="hidden" name="left_date" id="leftDateMarker">
                <input type="hidden" name="right_date" id="rightDateMarker">

                <div class="pages-wrapper">
                    <div class="page-side left-page">
                        <div class="diary-date" id="leftDateHeader"></div>
                        <textarea name="left_content" id="leftText" placeholder="Pour your thoughts onto the paper..."></textarea>
                    </div>

                    <div class="page-side right-page">
                        <div class="diary-date" id="rightDateHeader"></div>
                        <textarea name="right_content" id="rightText" placeholder="Continue your reflections here..."></textarea>
                    </div>
                </div>

                <div class="controls-row">
                    <button type="button" class="nav-btn" onclick="navigateEntries(-2)">← Previous Pages</button>
                    <button type="button" class="nav-btn" onclick="navigateEntries(2)">Next Pages →</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentLeftDate = null;
        let autosaveTimeout = null;

        function openDiary() {
            document.getElementById("coverState").style.display = "none";
            document.getElementById("bookState").style.display = "block";
            document.getElementById("diaryWrapper").classList.remove("closed");
            
            const today = new Date();
            loadPageData(today);
        }

        function closeDiary() {
            saveCurrentProgress().then(() => {
                document.getElementById("bookState").style.display = "none";
                document.getElementById("coverState").style.display = "flex";
                document.getElementById("diaryWrapper").classList.add("closed");
            });
        }

        function loadPageData(baseDate) {
            const year = baseDate.getFullYear();
            const month = String(baseDate.getMonth() + 1).padStart(2, '0');
            const day = String(baseDate.getDate()).padStart(2, '0');
            const formattedDateStr = `${year}-${month}-${day}`;

            fetch(`/get_pages?date=${formattedDateStr}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("leftDateMarker").value = data.left_date;
                    document.getElementById("rightDateMarker").value = data.right_date;

                    document.getElementById("leftDateHeader").textContent = data.left_header;
                    document.getElementById("rightDateHeader").textContent = data.right_header;
                    
                    document.getElementById("leftText").value = data.left_content || "";
                    document.getElementById("rightText").value = data.right_content || "";
                    
                    currentLeftDate = new Date(data.left_date + "T00:00:00");
                })
                .catch(error => console.error("Error loading page data:", error));
        }

        function saveCurrentProgress() {
            const form = document.getElementById("diaryForm");

            return fetch('/write', {
                method: 'POST',
                body: new FormData(form)
            })
            .catch(error => {
                console.error("Autosave backend communication error:", error);
            });
        }

        function navigateEntries(offset) {
            saveCurrentProgress().then(() => {
                const targetDate = new Date(currentLeftDate);
                targetDate.setDate(targetDate.getDate() + offset);
                loadPageData(targetDate);
            });
        }

        document.querySelectorAll('textarea').forEach(textarea => {
            textarea.addEventListener('input', () => {
                clearTimeout(autosaveTimeout);
                autosaveTimeout = setTimeout(() => {
                    saveCurrentProgress();
                }, 2000);
            });
        });
    </script>
</body>
</html>
